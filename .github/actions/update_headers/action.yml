name: Update Headers
inputs:
  url:
    description: 'URL of the native headers'
    type: 'string'
    required: true
  version:
    description: 'native headers version'
    type: 'string'
    required: true
  product_type:
    description: 'product type'
    type: 'string'
    required: true
  ai_json_url:
    description: 'URL of the AI JSON'
    type: 'string'
    required: false
    default: ''
  GH_TOKEN:
    description: 'GitHub token'
    type: 'string'
    required: true
  target_repository:
    description: 'Repository to update'
    type: 'string'
    required: false
    default: 'AgoraIO-Extensions/terra_shared_configs'
  target_branch:
    description: 'Branch to push updates to'
    type: 'string'
    required: false
    default: 'main'

runs:
  using: composite
  steps:
    - name: Prepare target repository
      id: prepare_target_repository
      run: |
        worktree_dir=$(mktemp -d "${RUNNER_TEMP}/terra_shared_configs.XXXXXX")
        auth_prefix="https://x-access-token:${{ inputs.GH_TOKEN }}@github.com/"
        auth_repo_url="${auth_prefix}${{ inputs.target_repository }}.git"
        git config --global url."${auth_prefix}".insteadOf ssh://git@github.com/
        git config --global url."${auth_prefix}".insteadOf git@github.com:
        git clone --depth 1 --branch "${{ inputs.target_branch }}" "$auth_repo_url" "$worktree_dir"
        echo "worktree_dir=$worktree_dir" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Update headers
      run: |
        bash "${{ steps.prepare_target_repository.outputs.worktree_dir }}/scripts/update_headers.sh" ${{ inputs.url }} ${{ inputs.version }} ${{ inputs.product_type }}
      shell: bash

    - uses: actions/setup-node@v3
      if: ${{ inputs.ai_json_url != '' }}
      with:
        node-version: '18.x'

    - name: Fetch AI JSON if ai_json_url is provided
      if: ${{ inputs.ai_json_url != '' }}
      run: |
        cd "${{ steps.prepare_target_repository.outputs.worktree_dir }}"
        yarn
        mkdir -p ai/temp
        curl -o ai/temp/differences.json ${{ inputs.ai_json_url }}
        yarn ts-node ai/index.ts ai/temp/differences.json configs/${{ inputs.product_type }}/ai/parameter_list.ts
      shell: bash

    - name: Push custom headers to GitHub
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git -C "${{ steps.prepare_target_repository.outputs.worktree_dir }}" add -A headers configs ai
        if git -C "${{ steps.prepare_target_repository.outputs.worktree_dir }}" diff --cached --quiet; then
          echo "No header changes to commit."
          exit 0
        fi
        git -C "${{ steps.prepare_target_repository.outputs.worktree_dir }}" commit -m "[AUTO] Update native headers to ${{ inputs.product_type }}_${{ inputs.version }}"
        git -C "${{ steps.prepare_target_repository.outputs.worktree_dir }}" push origin HEAD:${{ inputs.target_branch }}
      shell: bash

    - name: Cleanup target repository
      if: ${{ always() }}
      run: |
        rm -rf "${{ steps.prepare_target_repository.outputs.worktree_dir }}"
      shell: bash
